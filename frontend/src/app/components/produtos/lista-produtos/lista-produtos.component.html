<p-confirmDialog [dismissableMask]="true" />

<div class="page-header">
  <div class="page-header__info">
    <h2>Produtos</h2>
    <p class="page-subtitle">Gerencie o catálogo e o saldo em estoque</p>
  </div>
  <p-button label="Novo Produto" icon="pi pi-plus" (onClick)="abrirNovo()" />
</div>

@if (erro) {
  <div class="error-message">
    <i class="pi pi-exclamation-circle"></i> {{ erro }}
  </div>
}

<p-card>
  <p-table #dt [value]="produtos()" [tableStyle]="{'width':'100%'}" [loading]="carregando()"
           sortMode="single" (onSort)="onSort($event)"
           [paginator]="true" [rows]="10">

    <ng-template #header>
      <tr>
        <th pSortableColumn="codigo">
          Código <p-sortIcon field="codigo" />
        </th>
        <th pSortableColumn="descricao">
          Descrição <p-sortIcon field="descricao" />
        </th>
        <th class="text-center" pSortableColumn="saldo">
          Saldo <p-sortIcon field="saldo" />
        </th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template #body let-p>
      <tr>
        <td><code class="codigo-badge">{{ p.codigo }}</code></td>
        <td>
          <div class="produto-descricao">{{ p.descricao }}</div>
        </td>
        <td class="text-center">
          <span [class]="p.saldo === 0 ? 'saldo-zero' : 'saldo-ok'">{{ p.saldo }}</span>
        </td>
        <td class="text-right">
          <p-button icon="pi pi-pen-to-square" [text]="true" [rounded]="true" severity="secondary" pTooltip="Editar" (onClick)="abrirEditar(p)" />
          <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger" pTooltip="Excluir" (onClick)="excluir(p.id)" />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="4">
          @if (erroCarregamento(); as erroMsg) {
            <div class="empty-state empty-state--error">
              <i class="pi pi-exclamation-circle"></i>
              <p>{{ erroMsg }}</p>
            </div>
          } @else if (!carregando()) {
            <div class="empty-state">
              <i class="pi pi-box"></i>
              <p>Nenhum produto cadastrado ainda.</p>
            </div>
          }
        </td>
      </tr>
    </ng-template>

  </p-table>
</p-card>
