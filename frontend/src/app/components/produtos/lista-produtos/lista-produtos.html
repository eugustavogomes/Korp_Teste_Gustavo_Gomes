<p-confirmDialog [dismissableMask]="true" />

<div class="page-header">
  <h2>Produtos</h2>
  <p-button label="Novo Produto" icon="pi pi-plus" (onClick)="abrirNovo()" />
</div>

@if (erro) {
  <div class="error-message">
    <i class="pi pi-exclamation-circle"></i> {{ erro }}
  </div>
}

<p-card>
  <p-table [value]="produtos()" [tableStyle]="{'width':'100%'}" [loading]="carregando()">

    <ng-template #header>
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th class="text-center">Saldo</th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template #body let-p>
      <tr>
        <td><code class="codigo-badge">{{ p.codigo }}</code></td>
        <td><strong>{{ p.descricao }}</strong></td>
        <td class="text-center">
          <span [class]="p.saldo === 0 ? 'saldo-zero' : 'saldo-ok'">{{ p.saldo }}</span>
        </td>
        <td class="text-right">
          <p-button icon="pi pi-pencil" [text]="true" [rounded]="true" severity="secondary" pTooltip="Editar" (onClick)="abrirEditar(p)" />
          <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger" pTooltip="Excluir" (onClick)="excluir(p.id)" />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="4">
          @if (erroCarregamento(); as erroMsg) {
            <div class="empty-state empty-state--error">
              <i class="pi pi-wifi" style="opacity:0.4"></i>
              <p>{{ erroMsg }}</p>
            </div>
          } @else if (!carregando()) {
            <div class="empty-state">
              <i class="pi pi-box"></i>
              <p>Nenhum produto cadastrado.</p>
            </div>
          }
        </td>
      </tr>
    </ng-template>

  </p-table>
</p-card>
