@if (erro) {
  <div class="error-message mb-md">
    <i class="pi pi-exclamation-circle"></i> {{ erro }}
  </div>
}

<form #form="ngForm" class="product-form">

  <div class="field">
    <label for="codigo">Código</label>
    <input
      pInputText
      id="codigo"
      [(ngModel)]="produto.codigo"
      name="codigo"
      required
      placeholder="Ex: PROD-001"
      class="w-full"
    />
  </div>

  <div class="field">
    <label for="descricao">Descrição</label>
    <input
      pInputText
      id="descricao"
      [(ngModel)]="produto.descricao"
      name="descricao"
      required
      placeholder="Nome do produto"
      class="w-full"
    />
  </div>

  <div class="field">
    <label for="saldo">Saldo em Estoque</label>
    <p-inputnumber
      inputId="saldo"
      [(ngModel)]="produto.saldo"
      name="saldo"
      [min]="0"
      class="w-full"
    />
  </div>

</form>

<div class="dialog-footer">
  <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="cancelar()" />
  <p-button
    [label]="salvando ? 'Salvando...' : 'Salvar'"
    icon="pi pi-check"
    [disabled]="form.invalid || salvando"
    (onClick)="salvar()"
  />
</div>
