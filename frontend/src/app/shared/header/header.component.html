<p-toast position="bottom-right" [life]="3500" />

<header class="app-header">
  <div class="header-content">

    <a routerLink="/notas" class="logo">
      <span class="logo__icon"><i class="pi pi-receipt"></i></span>
      NF Sistema
    </a>

    <nav class="header-nav">
      <a routerLink="/notas" routerLinkActive="nav-active" class="nav-link">
        <i class="pi pi-barcode"></i>
        Notas Fiscais
      </a>
      <a routerLink="/produtos" routerLinkActive="nav-active" class="nav-link">
        <i class="pi pi-box"></i>
        Produtos
      </a>
    </nav>

    <div class="header-status">
      <app-status-indicator
        [status]="health.estoqueStatus()"
        [label]="'Estoque: ' + health.estoqueStatus()" />
      <span class="status-label">Estoque</span>
      <app-status-indicator
        [status]="health.faturamentoStatus()"
        [label]="'Faturamento: ' + health.faturamentoStatus()" />
      <span class="status-label">Faturamento</span>
    </div>

  </div>
</header>
